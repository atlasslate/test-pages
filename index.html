<div id="page-setup" class="page-content">
            <h1>Device Setup</h1>
            <p style="text-align: center;">Push your WiFi and location settings directly to the Sat Slate via USB.</p>
            
            <div class="warning-card browser-warning" style="display: none;">
                <h3>⚠️ Browser Not Supported</h3>
                <p>Web USB communication requires a Chromium-based browser (Chrome, Edge, Brave, Opera). Please switch browsers to use this feature.</p>
            </div>

            <div class="action-card serial-controls">
                <input type="text" id="cfg-ssid" placeholder="WiFi Network Name (SSID)" class="input-field">
                
                <div style="position: relative; max-width: 300px; margin: 8px auto;">
                    <input type="password" id="cfg-pass" placeholder="WiFi Password" class="input-field" style="margin: 0; padding-right: 40px;">
                    <span onclick="togglePassword()" style="position: absolute; right: 10px; top: 10px; cursor: pointer; font-size: 1.2em; user-select: none;" id="toggle-icon">👁️</span>
                </div>

                <input type="number" id="cfg-gmt" placeholder="GMT Offset (e.g. -5 for EST)" class="input-field">
                <input type="text" id="cfg-zip" placeholder="US ZIP Code" class="input-field">
                <div class="btn-group">
                    <button onclick="sendSerialConfig()" class="btn btn-blue">Push to Device</button>
                </div>
                <p id="serial-status" style="font-size: 0.9em; margin-top: 15px; color: #666;"></p>
            </div>
        </div>
